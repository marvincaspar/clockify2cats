name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: 
      - completed

jobs:
  release:
    name: Release new version
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git signing
        env:
          GIT_SIGNING_KEY: ${{ secrets.GIT_SIGNING_KEY }}
        run: |
          # Write the private key to a temp file
          mkdir -p ~/.ssh
          echo "$GIT_SIGNING_KEY" > ~/.ssh/id_sign
          chmod 600 ~/.ssh/id_sign

          # Configure Git
          git config --global gpg.format ssh
          git config --global user.signingkey ~/.ssh/id_sign
          git config --global user.name 'GitHub Action'
          git config --global user.email 'marvin.caspar@gmail.com'
          git config --global tag.gpgsign true

      - name: Create tag
        id: create_tag
        run: |
          VERSION=$(cat version.txt)

          if [ $(git tag --list "${VERSION}") ]; then
              echo "Tag ${VERSION} already exists."
              echo "is_new_tag=0" >> $GITHUB_OUTPUT
              exit 0
          fi

          git tag --sign --annotate "${VERSION}" --message='Created by GitHub Action'
          git push --tags
          echo "is_new_tag=1" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      - name: Set up Go
        if: ${{ steps.create_tag.outputs.is_new_tag == 1 }}
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install dependencies
        if: ${{ steps.create_tag.outputs.is_new_tag == 1 }}
        run: |
          go mod download
      - name: Run GoReleaser
        if: ${{ steps.create_tag.outputs.is_new_tag == 1 }}
        uses: goreleaser/goreleaser-action@v7
        with:
          # either 'goreleaser' (default) or 'goreleaser-pro'
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          VERSION: ${{ steps.create_tag.outputs.version }}